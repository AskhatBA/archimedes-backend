version: '3.8'

services:
  db:
    image: postgres:14
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Passqqaazz!1
      POSTGRES_DB: archimedes
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redisdata:/data

  backend:
    build: ./
    extra_hosts:
      - "misapi.archimedes.kz:192.168.10.2"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
    ports:
      - "4000:4000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    command: >
      sh -c "
      npm run db:migrate &&
      npm start
      "

  worker:
    build: ./
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
    depends_on:
      - redis
      - db
    env_file:
      - .env
    command: npm run worker

volumes:
  pgdata:
  redisdata:
